<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ChaosGateUnlocker</title>
	<link rel="icon" type="image/png" href="icon.png">
	<style>
		html, body {
			margin: 0;
			background: #151515;
		}
		body {
			display: flex;
			min-height: 100vh;
		}
		#wrap {
			margin: auto;
		}
		#stage {
			width: 800px;
			height: 600px;
			transform-origin: top left;
		}
		#stage iframe {
			width: 800px;
			height: 600px;
			border: 0;
			display: block;
		}
	</style>
</head>
<body>
	<div id="wrap"><div id="stage"><iframe src="app.html" title="ChaosGateUnlocker"></iframe></div></div>
	<script>
		function fit() {
			var s = Math.min(window.innerWidth / 800, 1);
			var stage = document.getElementById('stage');
			var wrap = document.getElementById('wrap');
			stage.style.transform = 'scale(' + s + ')';
			wrap.style.width = (800 * s) + 'px';
			wrap.style.height = (600 * s) + 'px';
		}
		window.addEventListener('resize', fit);
		fit();
	</script>
</body>
</html>
