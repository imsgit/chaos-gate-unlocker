name: Deploy WASM to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install fyne CLI
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install fonttools (for font subsetting)
        run: pipx install fonttools

      - name: Install binaryen (for wasm-opt -Oz)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build and compress wasm bundle
        run: bash build/build-wasm.sh

      - name: Archive Pages artifact
        run: |
          tar --dereference --hard-dereference \
            --directory wasm \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git --exclude=.github .

      - uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: "1"
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
