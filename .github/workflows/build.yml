name: Build (wasm + launchers)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install fyne CLI
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install fonttools (for font subsetting)
        run: pipx install fonttools

      - name: Build and compress wasm bundle
        run: bash build/build_wasm.sh

      - name: Archive Pages artifact
        run: |
          tar --dereference --hard-dereference \
            --directory wasm \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git --exclude=.github .

      - uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: "1"
          if-no-files-found: error

  deploy:
    needs: wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  launchers:
    runs-on: ubuntu-22.04
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install toolchains (WebKitGTK + mingw-w64)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Build launchers (linux + windows)
        run: bash build/build_launcher.sh linux windows

      - uses: actions/upload-artifact@v6
        with:
          name: ChaosGateUnlockerLauncher-windows
          path: fyne-cross/bin/windows-amd64/ChaosGateUnlockerLauncher.exe

      - uses: actions/upload-artifact@v6
        with:
          name: chaos-gate-unlocker-launcher-linux
          path: fyne-cross/bin/linux-amd64/chaos-gate-unlocker-launcher
