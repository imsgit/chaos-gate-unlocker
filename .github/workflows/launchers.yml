name: launchers

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I${{ github.workspace }}/build/winsdk"
      CGO_CXXFLAGS: "-I${{ github.workspace }}/build/winsdk"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Toolchain
        run: |
          go version || true
          gcc --version || true
          g++ --version || true
      - name: Build launcher
        run: |
          ver=$(grep -oE 'Version *= *"[^"]+"' FyneApp.toml | grep -oE '[0-9]+(\.[0-9]+)*')
          mkdir -p fyne-cross/bin/windows-amd64
          go build -trimpath -ldflags "-s -w -H windowsgui -X main.version=$ver" \
            -o fyne-cross/bin/windows-amd64/ChaosGateUnlockerLauncher.exe ./cmd/launcher
      - uses: actions/upload-artifact@v6
        with:
          name: ChaosGateUnlockerLauncher
          path: fyne-cross/bin/windows-amd64/ChaosGateUnlockerLauncher.exe

  linux:
    runs-on: ubuntu-22.04
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install WebKitGTK
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Build launcher
        run: |
          ver=$(grep -oE 'Version *= *"[^"]+"' FyneApp.toml | grep -oE '[0-9]+(\.[0-9]+)*')
          mkdir -p fyne-cross/bin/linux-amd64
          go build -trimpath -ldflags "-s -w -X main.version=$ver" \
            -o fyne-cross/bin/linux-amd64/chaos-gate-unlocker-launcher ./cmd/launcher
      - uses: actions/upload-artifact@v6
        with:
          name: chaos-gate-unlocker-launcher
          path: fyne-cross/bin/linux-amd64/chaos-gate-unlocker-launcher
