name: launcher-windows

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Toolchain
        run: |
          go version || true
          gcc --version || true
          g++ --version || true
      - name: Build launcher
        run: |
          ver=$(grep -oE 'Version *= *"[^"]+"' FyneApp.toml | grep -oE '[0-9]+(\.[0-9]+)*')
          mkdir -p fyne-cross/bin/windows-amd64
          go build -trimpath -ldflags "-s -w -H windowsgui -X main.version=$ver" \
            -o fyne-cross/bin/windows-amd64/ChaosGateUnlockerLauncher.exe ./cmd/launcher
      - uses: actions/upload-artifact@v4
        with:
          name: ChaosGateUnlockerLauncher-windows
          path: fyne-cross/bin/windows-amd64/ChaosGateUnlockerLauncher.exe
